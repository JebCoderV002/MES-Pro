<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MES PRO - Hệ thống Quản lý Đề thi</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/sortablejs@1.15.0/Sortable.min.js"></script>
    <script>
        tailwind.config = {
            darkMode: 'class',
            theme: {
                extend: {
                    colors: {
                        primary: { 50: '#eff6ff', 100: '#dbeafe', 200: '#bfdbfe', 300: '#93c5fd', 400: '#60a5fa', 500: '#3b82f6', 600: '#2563eb', 700: '#1d4ed8', 800: '#1e40af', 900: '#1e3a8a' },
                    }
                }
            }
        }
    </script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap');
        body { font-family: 'Inter', sans-serif; overflow: hidden; }
        
        .custom-scrollbar::-webkit-scrollbar { width: 6px; }
        .custom-scrollbar::-webkit-scrollbar-track { background: transparent; }
        .custom-scrollbar::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 10px; }
        .dark .custom-scrollbar::-webkit-scrollbar-thumb { background: #334155; }
        
        .glass { background: rgba(255, 255, 255, 0.8); backdrop-filter: blur(12px); }
        .dark .glass { background: rgba(15, 23, 42, 0.8); backdrop-filter: blur(12px); }

        .ans-card { transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1); border-left: 4px solid transparent; }
        .ans-card-answered { border-left-color: #3b82f6 !important; background-color: #ffffff; }
        .dark .ans-card-answered { background-color: #1e293b; }
        
        /* HIỆU ỨNG TRẠNG THÁI SAU KHI NỘP BÀI */
        .ans-card-correct { border-left-color: #10b981 !important; }
        .ans-card-partial { border-left-color: #f59e0b !important; }
        .ans-card-wrong { border-left-color: #ef4444 !important; }

        .btn-option { transition: all 0.3s; }

        /* HIỆU ỨNG ĐÁP ÁN ĐÚNG NỔI BẬT */
        .correct-ring-fancy {
            box-shadow: 0 0 0 2px white, 0 0 0 5px #10b981, 0 10px 20px -3px rgba(16, 185, 129, 0.5) !important;
            border-color: #10b981 !important;
            background-color: #10b981 !important;
            color: white !important;
            z-index: 30;
            position: relative;
            transform: scale(1.08);
            opacity: 1 !important;
            filter: brightness(1.1) !important;
        }

        .dark .correct-ring-fancy {
            box-shadow: 0 0 0 2px #0f172a, 0 0 0 5px #10b981, 0 10px 20px -3px rgba(16, 185, 129, 0.7) !important;
        }

        /* LÀM MỜ CÁC PHƯƠNG ÁN SAI */
        .dim-option {
            opacity: 0.35 !important;
            filter: grayscale(0.6) brightness(0.9);
            transform: scale(0.94);
            pointer-events: none;
        }

        /* PHƯƠNG ÁN CHỌN SAI: ĐỎ NHƯNG MỜ */
        .wrong-selection-dim {
            background-color: #ef4444 !important;
            border-color: #ef4444 !important;
            color: white !important;
            opacity: 0.65 !important;
            filter: brightness(0.85);
            transform: scale(0.98);
            z-index: 10;
        }
        
        .correct-bg { background-color: #f0fdf4 !important; }
        .dark .correct-bg { background-color: rgba(6, 78, 59, 0.2) !important; }
        
        .partial-bg { background-color: #fffbeb !important; }
        .dark .partial-bg { background-color: rgba(120, 53, 15, 0.1) !important; }

        .wrong-bg { background-color: #fef2f2 !important; }
        .dark .wrong-bg { background-color: rgba(69, 10, 10, 0.2) !important; }

        #theme-toggle-btn i { transition: all 0.5s ease; }
        .dark #theme-toggle-btn .fa-moon { display: none; }
        .dark #theme-toggle-btn .fa-sun { display: block; }
        #theme-toggle-btn .fa-sun { display: none; }
    </style>
</head>
<body class="bg-[#f8fafc] text-slate-900 dark:bg-[#020617] dark:text-slate-100 h-screen flex flex-col transition-colors duration-500">

    <script>
        const IMGBB_API_KEY = "24fcd0d3d51b240e4a6a30ea1ac6c1e7";
        const GOOGLE_SCRIPT_URL = "https://script.google.com/macros/s/AKfycby9CG2YxrvMGoH0KbaMbe1NQQR6dEa3jnrfewIKRRF9J8fH4DEy4d4Z5xFcCWGQuKAqvQ/exec";
        const TF_SCORE_MAP = [0, 0.1, 0.25, 0.5, 1];

        if (localStorage.theme === 'dark' || (!('theme' in localStorage) && window.matchMedia('(prefers-color-scheme: dark)').matches)) {
            document.documentElement.classList.add('dark');
        } else {
            document.documentElement.classList.remove('dark');
        }

        function toggleTheme() {
            if (document.documentElement.classList.contains('dark')) {
                document.documentElement.classList.remove('dark');
                localStorage.theme = 'light';
            } else {
                document.documentElement.classList.add('dark');
                localStorage.theme = 'dark';
            }
        }
    </script>

    <header id="main-header" class="glass sticky top-0 border-b dark:border-slate-800 p-4 flex justify-between items-center z-50 shadow-sm shrink-0">
        <div onclick="location.reload()" class="flex items-center gap-3 font-extrabold text-blue-600 dark:text-blue-400 text-2xl cursor-pointer tracking-tighter">
            <div class="bg-blue-600 text-white p-2 rounded-xl shadow-lg">
                <i class="fas fa-bolt"></i>
            </div>
            <span>MES<span class="text-slate-400 dark:text-slate-600">PRO</span></span>
        </div>
        <div class="flex items-center gap-2">
            <button id="theme-toggle-btn" onclick="toggleTheme()" class="w-10 h-10 flex items-center justify-center text-slate-500 dark:text-slate-400 hover:bg-slate-100 dark:hover:bg-slate-800 rounded-full transition-all">
                <i class="fas fa-moon"></i>
                <i class="fas fa-sun text-yellow-400"></i>
            </button>
            <div class="h-6 w-[1px] bg-slate-200 dark:bg-slate-800 mx-2"></div>
            <button onclick="showView('home')" class="px-5 py-2.5 text-sm font-bold rounded-xl text-blue-600 dark:text-blue-400 text-nowrap">Làm bài</button>
            <button onclick="showView('admin')" class="px-5 py-2.5 text-sm font-bold rounded-xl shadow-lg bg-blue-600 text-white hover:bg-blue-700 text-nowrap">Soạn đề</button>
        </div>
    </header>

    <main class="flex-1 relative overflow-hidden h-full">
        
        <!-- HOME VIEW -->
        <section id="view-home" class="h-full overflow-y-auto p-6 custom-scrollbar">
            <div class="max-w-6xl mx-auto grid grid-cols-1 lg:grid-cols-2 gap-10 items-start py-10">
                <div class="bg-white dark:bg-slate-900 p-10 rounded-[2.5rem] shadow-2xl border dark:border-slate-800 w-full relative overflow-hidden">
                    <div class="w-20 h-20 bg-blue-50 dark:bg-blue-900/20 text-blue-600 dark:text-blue-400 rounded-3xl flex items-center justify-center mx-auto mb-6 text-3xl shadow-inner">
                        <i class="fas fa-id-card"></i>
                    </div>
                    <h2 class="text-2xl font-black mb-8 text-center text-slate-800 dark:text-slate-100 uppercase tracking-tight">Vào phòng thi</h2>
                    <div class="space-y-4">
                        <div>
                            <label class="text-[10px] font-bold text-slate-400 uppercase ml-4 mb-1 block">Họ và tên</label>
                            <input id="userName" class="w-full p-4 bg-slate-50 dark:bg-slate-800 border-2 border-slate-100 dark:border-slate-700 rounded-2xl font-semibold dark:text-white outline-none" placeholder="Nhập tên của bạn...">
                        </div>
                        <div>
                            <label class="text-[10px] font-bold text-slate-400 uppercase ml-4 mb-1 block">Mã đề thi</label>
                            <input id="examCodeInput" class="w-full p-4 bg-slate-50 dark:bg-slate-800 border-2 border-slate-100 dark:border-slate-700 rounded-2xl font-black text-blue-600 dark:text-blue-400 tracking-[0.2em] outline-none" placeholder="Mã đề">
                        </div>
                        <button onclick="startExam()" class="w-full bg-blue-600 text-white p-5 rounded-2xl font-black shadow-xl hover:bg-blue-700 transition-all active:scale-95">BẮT ĐẦU LÀM BÀI</button>
                    </div>
                </div>

                <div class="bg-white/50 dark:bg-slate-900/50 backdrop-blur-md p-8 rounded-[2.5rem] border dark:border-slate-800 shadow-sm h-full flex flex-col">
                    <div class="flex justify-between items-center mb-6">
                        <h3 class="text-xl font-black text-slate-800 dark:text-slate-100 flex items-center gap-3">
                            <i class="fas fa-trophy text-yellow-500"></i>
                            BẢNG XẾP HẠNG
                        </h3>
                        <button onclick="loadLeaderboard()" class="text-blue-500 hover:rotate-180 transition-transform duration-500">
                            <i class="fas fa-sync-alt"></i>
                        </button>
                    </div>
                    <div id="leaderboard-content" class="flex-1 space-y-3 custom-scrollbar overflow-y-auto max-h-[400px]">
                        <p class="text-center py-10 text-slate-400 font-medium">Đang tải bảng xếp hạng...</p>
                    </div>
                </div>
            </div>
        </section>

        <!-- ADMIN VIEW -->
        <section id="view-admin" class="hidden h-full overflow-y-auto p-4 lg:p-8 max-w-7xl mx-auto custom-scrollbar">
            <div class="grid grid-cols-1 lg:grid-cols-12 gap-8 pb-32">
                <div class="lg:col-span-4 space-y-6">
                    <div class="bg-white dark:bg-slate-900 p-6 rounded-3xl border dark:border-slate-800 shadow-sm space-y-5">
                        <h3 class="font-black text-slate-500 text-[11px] uppercase tracking-widest">Cấu hình đề thi</h3>
                        <div class="space-y-4">
                            <input id="admin-title" class="w-full p-3.5 bg-slate-50 dark:bg-slate-800 border dark:border-slate-700 rounded-xl font-bold dark:text-white outline-none" placeholder="Tên đề thi">
                            <div class="grid grid-cols-2 gap-3">
                                <input id="admin-code" class="w-full p-3.5 bg-slate-50 dark:bg-slate-800 border dark:border-slate-700 rounded-xl font-black text-blue-600 uppercase outline-none" placeholder="Mã đề">
                                <input id="admin-duration" type="number" class="w-full p-3.5 bg-slate-50 dark:bg-slate-800 border dark:border-slate-700 rounded-xl font-black dark:text-white outline-none" value="45">
                            </div>
                            <input type="file" id="file-upload" class="hidden" multiple accept="image/*" onchange="handleFileUpload(event)">
                            <button onclick="document.getElementById('file-upload').click()" class="w-full py-6 border-2 border-dashed border-blue-200 dark:border-blue-800/50 rounded-2xl text-blue-600 font-black hover:bg-blue-50 transition-all">
                                <i class="fas fa-cloud-upload-alt mr-2"></i> Tải ảnh đề
                            </button>
                        </div>
                    </div>
                    <div id="admin-image-preview" class="grid grid-cols-2 gap-3"></div>
                </div>

                <div class="lg:col-span-8 space-y-6">
                    <div class="bg-white dark:bg-slate-900 p-6 rounded-3xl border dark:border-slate-800 shadow-sm min-h-[500px]">
                        <div class="flex justify-between items-center mb-8">
                            <h3 class="font-black text-slate-500 text-[11px] uppercase tracking-widest">Nội dung câu hỏi</h3>
                            <div class="flex gap-2">
                                <button onclick="addQuickQuestion('mcq')" class="px-3 py-2 bg-slate-900 text-white rounded-lg text-[10px] font-black">TRẮC NGHIỆM</button>
                                <button onclick="addQuickQuestion('true_false')" class="px-3 py-2 bg-emerald-600 text-white rounded-lg text-[10px] font-black">ĐÚNG/SAI</button>
                                <button onclick="addQuickQuestion('short')" class="px-3 py-2 bg-purple-600 text-white rounded-lg text-[10px] font-black">TRẢ LỜI NGẮN</button>
                            </div>
                        </div>
                        <div id="admin-question-list" class="space-y-3"></div>
                    </div>
                    <button onclick="saveToSheet()" class="w-full bg-blue-600 text-white p-6 rounded-3xl font-black text-xl shadow-xl hover:bg-blue-700 active:scale-95 transition-all">LƯU ĐỀ THI</button>
                </div>
            </div>
        </section>

        <!-- EXAM VIEW -->
        <section id="view-exam" class="hidden h-full flex flex-col md:flex-row overflow-hidden bg-slate-100 dark:bg-slate-950">
            <div id="exam-de-thi" class="flex-1 overflow-y-auto p-4 md:p-8 custom-scrollbar scroll-smooth">
                <div id="exam-pages-container" class="max-w-4xl mx-auto space-y-8"></div>
            </div>
            
            <div id="exam-dap-an" class="w-full md:w-[450px] bg-white dark:bg-slate-900 border-l dark:border-slate-800 flex flex-col shrink-0 z-20">
                <div class="p-5 border-b dark:border-slate-800 flex justify-between items-center bg-white/80 dark:bg-slate-900/80 backdrop-blur">
                    <div class="flex items-center gap-3">
                        <div id="timer-text" class="text-3xl font-black text-red-600 tabular-nums">00:00</div>
                        <div class="text-[10px] font-black text-slate-400 uppercase tracking-tighter" id="user-info-bar">User</div>
                    </div>
                    <div id="score-box" class="hidden text-right">
                        <div id="final-score" class="text-3xl font-black text-blue-600">0.0</div>
                        <div class="text-[8px] font-black text-blue-400">ĐIỂM</div>
                    </div>
                    <button id="btn-submit" onclick="confirmSubmit()" class="bg-emerald-600 text-white px-6 py-3 rounded-xl font-black text-xs shadow-lg shadow-emerald-600/20">NỘP BÀI</button>
                </div>
                <div id="exam-answer-sheet" class="flex-1 overflow-y-auto p-6 space-y-6 custom-scrollbar bg-slate-50/30 dark:bg-slate-950/20"></div>
                
                <!-- NÚT THOÁT PHÒNG THI -->
                <div class="p-4 border-t dark:border-slate-800 bg-white/50 dark:bg-slate-900/50">
                    <button onclick="handleExit()" class="w-full py-3 text-[11px] font-black text-slate-400 hover:text-red-500 uppercase tracking-[0.2em] transition-colors">
                        <i class="fas fa-sign-out-alt mr-2"></i> Thoát phòng thi
                    </button>
                </div>
            </div>
        </section>

    </main>

    <div id="loading" class="hidden fixed inset-0 bg-slate-900/80 backdrop-blur-xl z-[100] flex flex-col items-center justify-center text-white">
        <div class="w-12 h-12 border-4 border-blue-500/30 border-t-blue-500 rounded-full animate-spin"></div>
        <p class="mt-4 text-[10px] font-black tracking-widest uppercase">Đang đồng bộ dữ liệu</p>
    </div>

    <div id="modal-confirm" class="hidden fixed inset-0 bg-slate-950/80 z-[200] flex items-center justify-center p-4 backdrop-blur-sm">
        <div class="bg-white dark:bg-slate-900 rounded-[2.5rem] p-8 max-w-sm w-full text-center border dark:border-slate-800">
            <h3 class="text-xl font-black mb-4 uppercase">Nộp bài ngay?</h3>
            <p class="text-sm text-slate-400 mb-8">Bạn sẽ không thể thay đổi đáp án sau khi nộp bài.</p>
            <button onclick="submitExam()" class="w-full py-4 bg-emerald-600 text-white rounded-2xl font-black mb-2">XÁC NHẬN NỘP BÀI</button>
            <button onclick="toggleModal('modal-confirm', false)" class="w-full py-2 text-slate-400 font-bold">Quay lại</button>
        </div>
    </div>

    <script>
        let examData = { title: '', code: '', duration: 45, pages: [], questions: [] };
        let currentExam = null;
        let userAnswers = {};
        let timerInterval = null;
        let isSubmitted = false;

        window.onload = function() {
            const savedName = localStorage.getItem('mes_user_name');
            if (savedName) document.getElementById('userName').value = savedName;
            loadLeaderboard();
            
            Sortable.create(document.getElementById('admin-image-preview'), {
                animation: 250,
                onEnd: () => {
                    const newPages = [];
                    document.querySelectorAll('.admin-page-item').forEach(i => newPages.push(i.dataset.url));
                    examData.pages = newPages;
                }
            });
        };

        function showView(name) {
            ['home', 'admin', 'exam'].forEach(v => document.getElementById(`view-${v}`).classList.add('hidden'));
            document.getElementById(`view-${name}`).classList.remove('hidden');
            document.getElementById('main-header').classList.toggle('hidden', name === 'exam');
            if(name === 'home') loadLeaderboard();
        }

        function setLoading(s) { document.getElementById('loading').classList.toggle('hidden', !s); }
        function toggleModal(id, show) { document.getElementById(id).classList.toggle('hidden', !show); }

        async function loadLeaderboard() {
            const container = document.getElementById('leaderboard-content');
            try {
                const res = await fetch(`${GOOGLE_SCRIPT_URL}?type=get_leaderboard&t=${Date.now()}`);
                const data = await res.json();
                if(data.length === 0) {
                    container.innerHTML = `<p class="text-center py-10 text-slate-400">Chưa có dữ liệu xếp hạng</p>`;
                    return;
                }
                container.innerHTML = data.map((item, index) => `
                    <div class="flex items-center justify-between p-4 bg-white dark:bg-slate-800 rounded-2xl border dark:border-slate-700 shadow-sm">
                        <div class="flex items-center gap-4">
                            <span class="w-8 h-8 flex items-center justify-center font-black ${index < 3 ? 'text-yellow-500 text-lg' : 'text-slate-400 text-sm'}">
                                ${index === 0 ? '<i class="fas fa-crown"></i>' : index + 1}
                            </span>
                            <div>
                                <div class="font-bold dark:text-white text-sm">${item.name}</div>
                                <div class="text-[9px] text-slate-400 uppercase font-black">${item.examsCount} đề</div>
                            </div>
                        </div>
                        <div class="text-right">
                            <div class="text-lg font-black text-blue-600">${item.totalScore.toFixed(1)}</div>
                        </div>
                    </div>
                `).join('');
            } catch(e) { container.innerHTML = `<p class="text-center py-10 text-red-400">Lỗi tải dữ liệu</p>`; }
        }

        async function handleFileUpload(e) {
            const files = Array.from(e.target.files);
            if(!files.length) return;
            setLoading(true);
            const uploadPromises = files.map(async (file) => {
                const formData = new FormData();
                formData.append('image', file);
                try {
                    const res = await fetch(`https://api.imgbb.com/1/upload?key=${IMGBB_API_KEY}`, { method: 'POST', body: formData });
                    const json = await res.json();
                    return json.data.url;
                } catch(e) { return null; }
            });
            const urls = await Promise.all(uploadPromises);
            examData.pages.push(...urls.filter(u => u !== null));
            renderAdminImages();
            setLoading(false);
        }

        function renderAdminImages() {
            const container = document.getElementById('admin-image-preview');
            container.innerHTML = examData.pages.map((url, i) => `
                <div class="admin-page-item group relative aspect-[3/4] rounded-xl overflow-hidden border-2 dark:border-slate-800" data-url="${url}">
                    <img src="${url}" class="w-full h-full object-cover">
                    <button onclick="examData.pages.splice(${i},1);renderAdminImages()" class="absolute top-1 right-1 w-6 h-6 bg-red-500 text-white rounded-full opacity-0 group-hover:opacity-100 transition-all flex items-center justify-center"><i class="fas fa-times text-[10px]"></i></button>
                </div>
            `).join('');
        }

        function addQuickQuestion(type) {
            examData.questions.push({ type, points: 0.25, answer: type==='true_false'?[true,true,true,true]:(type==='mcq'?'A':'') });
            renderAdminQuestionList();
        }

        function renderAdminQuestionList() {
            const list = document.getElementById('admin-question-list');
            list.innerHTML = examData.questions.map((q, i) => `
                <div class="flex items-center gap-3 bg-slate-50 dark:bg-slate-800 p-3 rounded-xl border dark:border-slate-700">
                    <span class="w-8 h-8 flex items-center justify-center bg-blue-600 text-white rounded-lg font-black text-[10px]">${i+1}</span>
                    <div class="flex-1 flex flex-wrap gap-1">
                        ${q.type==='mcq' ? ['A','B','C','D'].map(l => `<button onclick="examData.questions[${i}].answer='${l}';renderAdminQuestionList()" class="w-8 h-8 rounded-lg border font-black text-[10px] ${q.answer===l?'bg-blue-600 text-white border-blue-600':'bg-white dark:bg-slate-900 text-slate-400 dark:border-slate-800'}">${l}</button>`).join('') :
                          q.type==='true_false' ? q.answer.map((v,j) => `<button onclick="examData.questions[${i}].answer[${j}]=!examData.questions[${i}].answer[${j}];renderAdminQuestionList()" class="px-2 h-8 rounded-lg border font-black text-[9px] ${v?'bg-emerald-600 text-white':'bg-red-600 text-white'}">${j+1}${v?'Đ':'S'}</button>`).join('') :
                          `<input onchange="examData.questions[${i}].answer=this.value" class="flex-1 px-3 h-8 rounded-lg border dark:bg-slate-900 dark:border-slate-800 text-[10px] font-bold" value="${q.answer}" placeholder="Đáp án...">`
                        }
                    </div>
                    <input type="number" step="0.1" onchange="examData.questions[${i}].points=parseFloat(this.value)" class="w-12 bg-transparent text-center font-black text-blue-600 text-[10px] outline-none" value="${q.points}">
                    <button onclick="examData.questions.splice(${i},1);renderAdminQuestionList()" class="text-slate-300 hover:text-red-500"><i class="fas fa-times-circle"></i></button>
                </div>
            `).join('');
        }

        async function saveToSheet() {
            examData.title = document.getElementById('admin-title').value;
            examData.code = document.getElementById('admin-code').value.trim().toUpperCase();
            examData.duration = parseInt(document.getElementById('admin-duration').value);
            if(!examData.code || !examData.pages.length) return alert("Vui lòng nhập mã đề và tải ảnh đề!");
            setLoading(true);
            try { 
                await fetch(GOOGLE_SCRIPT_URL, { method: 'POST', mode: 'no-cors', body: JSON.stringify({ type: 'save_exam', code: examData.code, data: examData }) }); 
                alert("Đã lưu đề thi thành công!"); 
                showView('home');
            } catch(e) { alert("Lỗi lưu đề!"); }
            setLoading(false);
        }

        async function startExam() {
            const name = document.getElementById('userName').value.trim();
            const code = document.getElementById('examCodeInput').value.trim().toUpperCase();
            if(!name || !code) return alert("Họ tên và mã đề không được để trống!");
            localStorage.setItem('mes_user_name', name);
            setLoading(true);
            try {
                const res = await fetch(`${GOOGLE_SCRIPT_URL}?code=${code}&t=${Date.now()}`);
                const data = await res.json();
                if(data.error) alert(data.error);
                else { 
                    currentExam = data; userAnswers = {}; isSubmitted = false; 
                    document.getElementById('user-info-bar').innerText = name; 
                    renderExamView(); startTimer(data.duration); showView('exam'); 
                }
            } catch(e) { alert("Mã đề không tồn tại!"); }
            setLoading(false);
        }

        function renderExamView() {
            document.getElementById('exam-pages-container').innerHTML = currentExam.pages.map(p => `<img src="${p}" class="w-full rounded-2xl shadow-lg border-2 border-white dark:border-slate-800">`).join('');
            const sheet = document.getElementById('exam-answer-sheet');
            sheet.innerHTML = currentExam.questions.map((q, i) => {
                let html = '';
                if(q.type === 'mcq') html = `<div class="grid grid-cols-4 gap-2">${['A','B','C','D'].map(l => `<button id="ans-${i}-${l}" onclick="setUAns(${i},'${l}')" class="btn-option py-4 border-2 rounded-xl font-black text-slate-400 dark:bg-slate-900 dark:border-slate-800">${l}</button>`).join('')}</div>`;
                else if(q.type === 'true_false') html = `<div class="grid grid-cols-2 gap-2">${[0,1,2,3].map(j => `<div class="bg-white dark:bg-slate-900 border p-2 rounded-xl flex items-center justify-between"><span class="text-[9px] font-black text-blue-500 italic">ý ${j+1}</span><div class="flex gap-1"><button id="tf-${i}-${j}-T" onclick="setUTF(${i},${j},true)" class="btn-option px-3 py-2 rounded-lg border-2 font-black text-[9px] text-slate-300">Đ</button><button id="tf-${i}-${j}-F" onclick="setUTF(${i},${j},false)" class="btn-option px-3 py-2 rounded-lg border-2 font-black text-[9px] text-slate-300">S</button></div></div>`).join('')}</div>`;
                else html = `<input id="short-${i}" onchange="setUAns(${i},this.value)" class="w-full p-4 dark:bg-slate-900 border-2 rounded-xl font-black text-blue-600 outline-none" placeholder="Nhập câu trả lời...">`;
                
                return `<div id="q-card-${i}" class="ans-card p-5 bg-white dark:bg-slate-900 rounded-3xl border-2 dark:border-slate-800 shadow-sm space-y-4">
                    <div class="flex justify-between items-center"><span class="text-[9px] font-black text-slate-400 uppercase tracking-widest">Câu hỏi ${i+1}</span><span class="text-[9px] font-bold text-slate-500 uppercase">${q.points}đ</span></div>
                    ${html}
                    <div id="correct-label-${i}" class="hidden mt-2 p-3 bg-emerald-50 dark:bg-emerald-950/40 text-emerald-600 dark:text-emerald-400 rounded-xl text-[10px] font-bold border dark:border-emerald-900/50"></div>
                </div>`;
            }).join('');
        }

        function setUAns(i, v) {
            if(isSubmitted) return;
            userAnswers[i] = v;
            document.getElementById(`q-card-${i}`).classList.add('ans-card-answered');
            if(currentExam.questions[i].type === 'mcq') {
                ['A','B','C','D'].forEach(l => {
                    const b = document.getElementById(`ans-${i}-${l}`);
                    if(b) b.className = l===v ? "btn-option py-4 border-2 rounded-xl font-black bg-blue-600 border-blue-600 text-white shadow-lg" : "btn-option py-4 border-2 dark:border-slate-800 rounded-xl font-black text-slate-300 bg-white dark:bg-slate-900 opacity-50";
                });
            }
        }

        function setUTF(i, j, v) {
            if(isSubmitted) return;
            if(!userAnswers[i]) userAnswers[i] = [null,null,null,null];
            userAnswers[i][j] = v;
            const bT = document.getElementById(`tf-${i}-${j}-T`), bF = document.getElementById(`tf-${i}-${j}-F`);
            if(v) { 
                bT.className = "btn-option px-3 py-2 rounded-lg bg-emerald-600 border-emerald-600 text-white font-black shadow-md"; 
                bF.className = "btn-option px-3 py-2 rounded-lg border-2 dark:border-slate-800 text-slate-200 bg-white dark:bg-slate-900 opacity-40 font-black"; 
            } else { 
                bF.className = "btn-option px-3 py-2 rounded-lg bg-red-600 border-red-600 text-white font-black shadow-md"; 
                bT.className = "btn-option px-3 py-2 rounded-lg border-2 dark:border-slate-800 text-slate-200 bg-white dark:bg-slate-900 opacity-40 font-black"; 
            }
            if(userAnswers[i].every(x => x !== null)) document.getElementById(`q-card-${i}`).classList.add('ans-card-answered');
        }

        function startTimer(m) {
            let s = m * 60;
            clearInterval(timerInterval);
            timerInterval = setInterval(() => {
                const mm = Math.floor(s/60), ss = s%60;
                document.getElementById('timer-text').innerText = `${mm.toString().padStart(2,'0')}:${ss.toString().padStart(2,'0')}`;
                if(s <= 0) { clearInterval(timerInterval); submitExam(); }
                s--;
            }, 1000);
        }

        async function submitExam() {
            isSubmitted = true; clearInterval(timerInterval); toggleModal('modal-confirm', false);
            document.getElementById('btn-submit').classList.add('hidden');
            document.getElementById('score-box').classList.remove('hidden');

            let totalScore = 0;
            currentExam.questions.forEach((q, i) => {
                const u = userAnswers[i];
                const pts = parseFloat(q.points);
                const card = document.getElementById(`q-card-${i}`);
                const lbl = document.getElementById(`correct-label-${i}`);

                card.classList.remove('ans-card-answered');

                if(q.type === 'mcq') {
                    ['A','B','C','D'].forEach(l => {
                        const btn = document.getElementById(`ans-${i}-${l}`);
                        if(btn) btn.classList.add('dim-option');
                    });

                    const correctBtn = document.getElementById(`ans-${i}-${q.answer}`);
                    if(correctBtn) {
                        correctBtn.classList.remove('dim-option');
                        correctBtn.classList.add('correct-ring-fancy');
                    }

                    if(u === q.answer) { 
                        totalScore += pts; 
                        card.classList.add('correct-bg', 'ans-card-correct'); 
                    } else { 
                        card.classList.add('wrong-bg', 'ans-card-wrong');
                        if(u) {
                            const wrongBtn = document.getElementById(`ans-${i}-${u}`);
                            if(wrongBtn) {
                                wrongBtn.classList.remove('dim-option');
                                wrongBtn.classList.add('wrong-selection-dim');
                            }
                        }
                    }
                } else if(q.type === 'true_false') {
                    let correctCount = 0;
                    const ua = u || [null,null,null,null];
                    for(let j=0; j<4; j++) {
                        const studentSelected = ua[j] === true ? 'T' : (ua[j] === false ? 'F' : null);
                        const correctSuffix = q.answer[j] ? 'T' : 'F';
                        
                        const btnT = document.getElementById(`tf-${i}-${j}-T`);
                        const btnF = document.getElementById(`tf-${i}-${j}-F`);
                        
                        [btnT, btnF].forEach(b => b.classList.add('dim-option'));

                        const correctBtn = document.getElementById(`tf-${i}-${j}-${correctSuffix}`);
                        if(correctBtn) {
                            correctBtn.classList.remove('dim-option');
                            correctBtn.classList.add('correct-ring-fancy');
                        }

                        if(ua[j] === q.answer[j]) {
                            correctCount++;
                        } else if(studentSelected) {
                            const wrongBtn = document.getElementById(`tf-${i}-${j}-${studentSelected}`);
                            if(wrongBtn) {
                                wrongBtn.classList.remove('dim-option');
                                wrongBtn.classList.add('wrong-selection-dim');
                            }
                        }
                    }
                    totalScore += (TF_SCORE_MAP[correctCount] * pts);
                    
                    if(correctCount === 4) {
                        card.classList.add('correct-bg', 'ans-card-correct');
                    } else if(correctCount > 0) {
                        card.classList.add('partial-bg', 'ans-card-partial');
                    } else {
                        card.classList.add('wrong-bg', 'ans-card-wrong');
                    }

                    lbl.innerHTML = `<i class="fas fa-info-circle mr-1"></i>Đúng: ${correctCount}/4 ý. Đáp án: ${q.answer.map((v, idx) => (idx+1)+(v?'Đ':'S')).join(', ')}`;
                    lbl.classList.remove('hidden');
                } else {
                    const studentInput = document.getElementById(`short-${i}`);
                    if(u && u.trim().toLowerCase() === q.answer.toString().toLowerCase()) { 
                        totalScore += pts; 
                        card.classList.add('correct-bg', 'ans-card-correct'); 
                    } else { 
                        card.classList.add('wrong-bg', 'ans-card-wrong');
                        if(studentInput) studentInput.classList.add('opacity-70', 'bg-red-50', 'text-red-700', 'border-red-300');
                    }
                    lbl.innerHTML = `<i class="fas fa-info-circle mr-1"></i>Đáp án: <span class="uppercase">${q.answer}</span>`;
                    lbl.classList.remove('hidden');
                }
            });

            document.getElementById('final-score').innerText = totalScore.toFixed(2);
            setLoading(true);
            try { 
                await fetch(GOOGLE_SCRIPT_URL, { 
                    method: 'POST', 
                    mode: 'no-cors', 
                    body: JSON.stringify({ 
                        type: 'submission', 
                        name: document.getElementById('userName').value, 
                        examCode: currentExam.code, 
                        score: totalScore.toFixed(2) 
                    }) 
                }); 
            } catch(e) {}
            setLoading(false);
            document.getElementById('exam-answer-sheet').scrollTo({top:0, behavior:'smooth'});
        }

        function confirmSubmit() { toggleModal('modal-confirm', true); }
        function handleExit() { if(confirm("Bạn có chắc chắn muốn thoát khỏi phòng thi? Kết quả chưa nộp sẽ bị mất.")) location.reload(); }
    </script>
</body>
</html>
