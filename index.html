<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MES PRO - Hệ thống Quản lý Đề thi</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&display=swap');
        body { font-family: 'Inter', sans-serif; scroll-behavior: smooth; }
        .animate-fade-in { animation: fadeIn 0.3s ease-out; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        .sticky-header { position: sticky; top: 0; z-index: 50; }
        input[type=number]::-webkit-inner-spin-button, 
        input[type=number]::-webkit-outer-spin-button { -webkit-appearance: none; margin: 0; }
        .correct-ring { ring: 4px; ring-color: #10b981; } /* emerald-500 */
    </style>
</head>
<body class="bg-slate-50 text-slate-900 min-h-screen">

    <!-- CẤU HÌNH API -->
    <script>
        const IMGBB_API_KEY = "24fcd0d3d51b240e4a6a30ea1ac6c1e7";
        const GOOGLE_SCRIPT_URL = "https://script.google.com/macros/s/AKfycbyAIAyxRNf2pCxiu1JaYLfazvOkkx-aHmo-yhIByMK_Ab6VZdnZT6ersdJyce2zCqxxUQ/exec";
        const TF_SCORE_MAP = [0, 0.1, 0.25, 0.5, 1];
    </script>

    <div id="app">
        <!-- Header Tổng -->
        <header id="main-header" class="bg-white border-b p-4 flex justify-between items-center sticky-header shadow-sm">
            <div onclick="location.reload()" class="flex items-center gap-2 font-bold text-blue-600 text-xl cursor-pointer">
                <i class="fas fa-bolt"></i> <span>MES PRO</span>
            </div>
            <div class="flex gap-2">
                <button onclick="showView('home')" id="nav-home" class="px-4 py-2 text-sm font-semibold rounded-xl transition bg-blue-50 text-blue-600">Làm bài</button>
                <button onclick="showView('admin')" id="nav-admin" class="px-4 py-2 text-sm font-semibold rounded-xl shadow-md transition bg-blue-600 text-white hover:bg-blue-700">Soạn đề</button>
            </div>
        </header>

        <!-- Thanh trạng thái khi thi & Kết quả -->
        <div id="exam-status-bar" class="hidden fixed top-4 right-4 z-[60] flex flex-col gap-2 items-end pointer-events-none">
            <!-- Timer & Info -->
            <div id="timer-box" class="bg-white/90 backdrop-blur-md border shadow-2xl p-4 rounded-2xl flex items-center gap-4 pointer-events-auto">
                <div class="text-right">
                    <div id="timer-display" class="text-2xl font-black text-red-600 leading-none">00:00</div>
                    <div id="exam-user-info" class="text-[10px] font-bold text-slate-400 mt-1 uppercase">---</div>
                </div>
                <button id="btn-submit" onclick="submitExam()" class="bg-emerald-600 text-white px-5 py-3 rounded-xl font-black shadow-lg hover:bg-emerald-700 transition text-sm">NỘP BÀI</button>
            </div>
            <!-- Bảng điểm (Chỉ hiện sau khi nộp) -->
            <div id="score-box" class="hidden bg-blue-600 text-white shadow-2xl p-4 rounded-2xl flex flex-col items-center pointer-events-auto animate-fade-in">
                <span class="text-[10px] font-bold opacity-80 uppercase tracking-widest">ĐIỂM SỐ</span>
                <div id="final-score-display" class="text-4xl font-black">0.0</div>
                <button onclick="location.reload()" class="mt-2 text-[10px] font-bold underline opacity-80 hover:opacity-100">THOÁT</button>
            </div>
        </div>

        <main class="max-w-3xl mx-auto p-4 mt-2">
            
            <!-- VIEW: HOME -->
            <section id="view-home" class="animate-fade-in">
                <div class="max-w-md mx-auto bg-white p-8 rounded-3xl shadow-2xl border border-slate-100 mt-10">
                    <h2 class="text-2xl font-black mb-8 text-center text-slate-800 uppercase">Vào phòng thi</h2>
                    <div class="space-y-5">
                        <input id="userName" class="w-full p-4 bg-slate-50 border rounded-2xl outline-none focus:ring-2 focus:ring-blue-500" placeholder="Họ và Tên học sinh">
                        <input id="examCodeInput" class="w-full p-4 bg-slate-50 border rounded-2xl outline-none focus:ring-2 focus:ring-blue-500 uppercase font-black text-blue-600" placeholder="Mã đề thi">
                        <button onclick="startExam()" class="w-full bg-blue-600 text-white p-5 rounded-2xl font-black shadow-lg hover:bg-blue-700 transition flex items-center justify-center gap-2">
                            BẮT ĐẦU <i class="fas fa-chevron-right"></i>
                        </button>
                    </div>
                </div>
            </section>

            <!-- VIEW: ADMIN -->
            <section id="view-admin" class="hidden animate-fade-in space-y-6">
                <div class="bg-white p-6 rounded-3xl border shadow-sm space-y-4">
                    <h2 class="text-xl font-bold flex items-center gap-2 text-slate-800"><i class="fas fa-cog"></i> Cấu hình đề thi</h2>
                    <div class="space-y-4">
                        <input id="admin-title" class="w-full p-4 bg-slate-50 border rounded-2xl outline-none focus:ring-2 focus:ring-blue-400" placeholder="Tên kỳ thi">
                        <div class="grid grid-cols-2 gap-4">
                            <div class="relative">
                                <i class="fas fa-fingerprint absolute left-4 top-1/2 -translate-y-1/2 text-slate-300"></i>
                                <input id="admin-code" class="w-full pl-10 pr-4 py-4 bg-slate-50 border rounded-2xl outline-none focus:ring-2 focus:ring-blue-400 uppercase font-bold text-blue-600" placeholder="Mã đề">
                            </div>
                            <div class="relative">
                                <i class="fas fa-clock absolute left-4 top-1/2 -translate-y-1/2 text-slate-300"></i>
                                <input id="admin-duration" type="number" class="w-full pl-10 pr-12 py-4 bg-slate-50 border rounded-2xl outline-none focus:ring-2 focus:ring-blue-400 font-bold" placeholder="Phút" value="45">
                                <span class="absolute right-4 top-1/2 -translate-y-1/2 text-[10px] font-bold text-slate-400">PHÚT</span>
                            </div>
                        </div>
                    </div>
                </div>
                <div id="question-list" class="space-y-6"></div>
                <div class="flex flex-wrap gap-4 justify-center bg-white p-6 rounded-[2rem] border shadow-sm">
                    <button onclick="addQuestion('mcq')" class="px-6 py-3 rounded-2xl border-2 border-blue-50 text-blue-600 font-black text-xs flex items-center gap-2 hover:bg-blue-50">TRẮC NGHIỆM</button>
                    <button onclick="addQuestion('true_false')" class="px-6 py-3 rounded-2xl border-2 border-emerald-50 text-emerald-600 font-black text-xs flex items-center gap-2 hover:bg-emerald-50">ĐÚNG/SAI</button>
                    <button onclick="addQuestion('short')" class="px-6 py-3 rounded-2xl border-2 border-purple-50 text-purple-600 font-black text-xs flex items-center gap-2 hover:bg-purple-50">TRẢ LỜI NGẮN</button>
                </div>
                <button onclick="saveToSheet()" class="w-full bg-slate-900 text-white p-6 rounded-[2rem] font-black text-lg shadow-2xl hover:bg-black transition mb-10 uppercase tracking-widest">Lưu đề thi</button>
            </section>

            <!-- VIEW: EXAM (Lưu ý: Không còn View Result riêng) -->
            <section id="view-exam" class="hidden animate-fade-in space-y-6 pb-24">
                <div id="exam-questions" class="space-y-6"></div>
            </section>

        </main>
    </div>

    <!-- Loading -->
    <div id="loading" class="hidden fixed inset-0 bg-white/80 z-[100] flex flex-col items-center justify-center">
        <div class="w-12 h-12 border-4 border-blue-600 border-t-transparent rounded-full animate-spin mb-4"></div>
        <p class="font-bold text-blue-600">Đang xử lý...</p>
    </div>

    <script>
        let examData = { title: '', code: '', duration: 45, questions: [] };
        let currentExam = null;
        let userAnswers = {};
        let timerInterval = null;
        let isSubmitted = false;

        function showView(viewName) {
            ['home', 'admin', 'exam'].forEach(v => {
                document.getElementById(`view-${v}`).classList.add('hidden');
            });
            document.getElementById(`view-${viewName}`).classList.remove('hidden');
            document.getElementById('main-header').classList.toggle('hidden', viewName === 'exam');
            document.getElementById('exam-status-bar').classList.toggle('hidden', viewName !== 'exam');
        }

        function setLoading(status) {
            document.getElementById('loading').classList.toggle('hidden', !status);
        }

        // --- ADMIN ---
        function addQuestion(type) {
            let defaultPoints = type === 'short' ? 0.5 : (type === 'true_false' ? 1.0 : 0.25);
            const newQ = { type, image: '', answer: type === 'true_false' ? [true, true, true, true] : (type === 'mcq' ? 'A' : ''), points: defaultPoints };
            examData.questions.push(newQ);
            renderAdminQuestions();
        }

        function renderAdminQuestions() {
            const list = document.getElementById('question-list');
            list.innerHTML = '';
            examData.questions.forEach((q, idx) => {
                const qDiv = document.createElement('div');
                qDiv.className = "bg-white p-6 rounded-3xl border shadow-sm space-y-4 animate-fade-in";
                let answerHtml = '';
                if (q.type === 'mcq') {
                    answerHtml = `<div class="flex gap-2">${['A','B','C','D'].map(l => `<button onclick="updateQ(${idx}, {answer: '${l}'})" class="w-10 h-10 rounded-xl border-2 font-bold ${q.answer === l ? 'bg-blue-600 text-white border-blue-600' : 'bg-white text-slate-400 border-slate-100'}">${l}</button>`).join('')}</div>`;
                } else if (q.type === 'true_false') {
                    answerHtml = `<div class="grid grid-cols-2 md:grid-cols-4 gap-2">${q.answer.map((val, j) => `<button onclick="toggleTF(${idx}, ${j})" class="p-2 rounded-xl text-[10px] font-bold border ${val ? 'bg-green-50 text-green-600' : 'bg-red-50 text-red-600'}">Ý ${j+1}: ${val ? 'ĐÚNG' : 'SAI'}</button>`).join('')}</div>`;
                } else {
                    answerHtml = `<input onchange="updateQ(${idx}, {answer: this.value})" class="w-full p-3 bg-slate-50 border rounded-xl" value="${q.answer}" placeholder="Đáp án đúng">`;
                }
                qDiv.innerHTML = `
                    <div class="flex justify-between items-center"><span class="bg-blue-600 text-white px-3 py-1 rounded-lg font-bold italic text-xs">#${idx+1}</span><input type="number" step="0.01" onchange="updateQ(${idx}, {points: parseFloat(this.value)})" class="w-16 bg-slate-50 border rounded-lg text-center font-bold text-blue-600" value="${q.points}"><button onclick="removeQ(${idx})" class="text-slate-300 hover:text-red-500"><i class="fas fa-trash"></i></button></div>
                    <div class="border-2 border-dashed border-slate-200 rounded-2xl p-4 text-center cursor-pointer" onpaste="handlePaste(event, ${idx})" tabindex="0">${q.image ? `<img src="${q.image}" class="max-h-40 mx-auto rounded-xl">` : `<p class="text-slate-400 text-xs italic">Dán ảnh (Ctrl+V)</p>`}</div>
                    ${answerHtml}
                `;
                list.appendChild(qDiv);
            });
        }
        function updateQ(idx, fields) { examData.questions[idx] = {...examData.questions[idx], ...fields}; renderAdminQuestions(); }
        function removeQ(idx) { examData.questions.splice(idx, 1); renderAdminQuestions(); }
        function toggleTF(idx, j) { examData.questions[idx].answer[j] = !examData.questions[idx].answer[j]; renderAdminQuestions(); }
        async function handlePaste(e, idx) {
            const items = (e.clipboardData || e.originalEvent.clipboardData).items;
            for (let i = 0; i < items.length; i++) {
                if (items[i].type.indexOf("image") !== -1) {
                    setLoading(true);
                    const blob = items[i].getAsFile();
                    const formData = new FormData();
                    formData.append('image', blob);
                    try {
                        const res = await fetch(`https://api.imgbb.com/1/upload?key=${IMGBB_API_KEY}`, { method: 'POST', body: formData });
                        const data = await res.json();
                        if (data.data.url) { examData.questions[idx].image = data.data.url; renderAdminQuestions(); }
                    } catch (err) { alert("Lỗi tải ảnh!"); }
                    setLoading(false);
                }
            }
        }
        async function saveToSheet() {
            examData.title = document.getElementById('admin-title').value;
            examData.code = document.getElementById('admin-code').value.trim().toUpperCase();
            examData.duration = parseInt(document.getElementById('admin-duration').value) || 45;
            if(!examData.title || !examData.code) return alert("Nhập đủ thông tin!");
            setLoading(true);
            try { await fetch(GOOGLE_SCRIPT_URL, { method: 'POST', mode: 'no-cors', body: JSON.stringify({ type: 'save_exam', code: examData.code, data: examData }) }); alert("Đã lưu!"); } catch(e) { alert("Lỗi!"); }
            setLoading(false);
        }

        // --- EXAM & TIMER ---
        async function startExam() {
            const name = document.getElementById('userName').value;
            const code = document.getElementById('examCodeInput').value.trim().toUpperCase();
            if(!name || !code) return alert("Nhập đủ tên và mã!");
            setLoading(true);
            try {
                const res = await fetch(`${GOOGLE_SCRIPT_URL}?code=${code}&t=${Date.now()}`);
                const data = await res.json();
                if(data.error) alert(data.error);
                else {
                    currentExam = data; userAnswers = {}; isSubmitted = false;
                    document.getElementById('exam-user-info').innerText = `${name} | ${data.code}`;
                    document.getElementById('timer-box').classList.remove('hidden');
                    document.getElementById('score-box').classList.add('hidden');
                    renderExamQuestions();
                    startTimer(data.duration || 45);
                    showView('exam');
                }
            } catch(e) { alert("Lỗi!"); }
            setLoading(false);
        }

        function startTimer(minutes) {
            let seconds = minutes * 60;
            clearInterval(timerInterval);
            timerInterval = setInterval(() => {
                const m = Math.floor(seconds / 60), s = seconds % 60;
                document.getElementById('timer-display').innerText = `${m.toString().padStart(2, '0')}:${s.toString().padStart(2, '0')}`;
                if (seconds <= 0) { clearInterval(timerInterval); submitExam(); }
                seconds--;
            }, 1000);
        }

        function renderExamQuestions() {
            const container = document.getElementById('exam-questions');
            container.innerHTML = '';
            currentExam.questions.forEach((q, i) => {
                const qDiv = document.createElement('div');
                qDiv.id = `q-card-${i}`;
                qDiv.className = "bg-white p-6 rounded-3xl border shadow-sm space-y-4 animate-fade-in transition-all duration-500";
                
                let inputHtml = '';
                if(q.type === 'mcq') {
                    inputHtml = `<div class="grid grid-cols-4 gap-2">
                        ${['A','B','C','D'].map(l => `<button id="q-${i}-ans-${l}" onclick="setUserAns(${i}, '${l}')" class="p-4 rounded-xl border-2 font-bold text-slate-400 bg-white border-slate-50 transition-all">${l}</button>`).join('')}
                    </div>`;
                } else if(q.type === 'true_false') {
                    inputHtml = `<div class="space-y-2">
                        ${[0,1,2,3].map(j => `
                            <div class="flex justify-between items-center p-3 bg-slate-50 rounded-xl">
                                <span class="text-xs font-bold text-slate-400 uppercase">Ý ${j+1}</span>
                                <div class="flex gap-2">
                                    <button id="q-${i}-tf-${j}-true" onclick="setTFAns(${i}, ${j}, true)" class="px-4 py-2 rounded-lg text-[10px] font-bold bg-white border text-slate-300 transition-all">ĐÚNG</button>
                                    <button id="q-${i}-tf-${j}-false" onclick="setTFAns(${i}, ${j}, false)" class="px-4 py-2 rounded-lg text-[10px] font-bold bg-white border text-slate-300 transition-all">SAI</button>
                                </div>
                            </div>
                        `).join('')}
                    </div>`;
                } else {
                    inputHtml = `<div class="space-y-2">
                        <input id="q-${i}-short" onchange="setUserAns(${i}, this.value)" class="w-full p-4 bg-slate-50 border-2 border-slate-100 rounded-xl outline-none font-bold text-lg" placeholder="Nhập câu trả lời...">
                        <div id="q-${i}-short-correct" class="hidden text-xs font-bold text-emerald-600 bg-emerald-50 p-2 rounded-lg italic"></div>
                    </div>`;
                }
                qDiv.innerHTML = `<div class="flex justify-between items-center"><span class="bg-slate-100 text-slate-500 px-3 py-1 rounded-full text-[10px] font-black uppercase">Câu ${i+1}</span><span class="text-[10px] font-bold text-blue-500 bg-blue-50 px-3 py-1 rounded-full">${q.points} Điểm</span></div>${q.image ? `<img src="${q.image}" class="max-w-full rounded-xl mx-auto border shadow-sm">` : ''}${inputHtml}`;
                container.appendChild(qDiv);
            });
        }

        function setUserAns(i, val) {
            if(isSubmitted) return;
            userAnswers[i] = val;
            if(currentExam.questions[i].type === 'mcq') {
                ['A','B','C','D'].forEach(l => {
                    const b = document.getElementById(`q-${i}-ans-${l}`);
                    b.className = (l === val) ? "p-4 rounded-xl border-2 font-bold bg-blue-600 text-white border-blue-600 shadow-lg scale-105" : "p-4 rounded-xl border-2 font-bold text-slate-400 bg-white border-slate-50";
                });
            }
        }

        function setTFAns(i, j, val) {
            if(isSubmitted) return;
            if(!userAnswers[i]) userAnswers[i] = [null, null, null, null];
            userAnswers[i][j] = val;
            const bT = document.getElementById(`q-${i}-tf-${j}-true`), bF = document.getElementById(`q-${i}-tf-${j}-false`);
            if(val) { bT.className = "px-4 py-2 rounded-lg text-[10px] font-bold bg-green-600 text-white shadow-md"; bF.className = "px-4 py-2 rounded-lg text-[10px] font-bold bg-white border text-slate-300"; }
            else { bF.className = "px-4 py-2 rounded-lg text-[10px] font-bold bg-red-600 text-white shadow-md"; bT.className = "px-4 py-2 rounded-lg text-[10px] font-bold bg-white border text-slate-300"; }
        }

        async function submitExam() {
            if(isSubmitted) return;
            isSubmitted = true;
            clearInterval(timerInterval);
            
            // Ẩn box timer, hiện box score
            document.getElementById('timer-box').classList.add('hidden');
            document.getElementById('score-box').classList.remove('hidden');

            let total = 0;
            currentExam.questions.forEach((q, i) => {
                const u = userAnswers[i];
                const pts = parseFloat(q.points || 0);
                const qCard = document.getElementById(`q-card-${i}`);
                
                if(q.type === 'mcq') {
                    const isCorrect = u === q.answer;
                    if(isCorrect) total += pts;
                    // Highlight nút đáp án đúng (Viền emerald)
                    const correctBtn = document.getElementById(`q-${i}-ans-${q.answer}`);
                    correctBtn.classList.add('ring-4', 'ring-emerald-400', 'ring-offset-2');
                    // Nếu chọn sai, tô đỏ nút đã chọn
                    if(!isCorrect && u) {
                        const wrongBtn = document.getElementById(`q-${i}-ans-${u}`);
                        wrongBtn.classList.replace('bg-blue-600', 'bg-red-500');
                        wrongBtn.classList.replace('border-blue-600', 'border-red-500');
                    }
                    qCard.classList.add(isCorrect ? 'bg-emerald-50' : 'bg-red-50');
                } 
                else if(q.type === 'short') {
                    const isCorrect = u?.trim().toLowerCase() === q.answer.trim().toLowerCase();
                    if(isCorrect) total += pts;
                    const inputField = document.getElementById(`q-${i}-short`);
                    inputField.disabled = true;
                    inputField.classList.add(isCorrect ? 'text-emerald-600' : 'text-red-600');
                    // Hiện đáp án đúng bên dưới
                    const correctMsg = document.getElementById(`q-${i}-short-correct`);
                    correctMsg.innerText = `Đáp án đúng: ${q.answer}`;
                    correctMsg.classList.remove('hidden');
                    qCard.classList.add(isCorrect ? 'bg-emerald-50' : 'bg-red-50');
                } 
                else if(q.type === 'true_false') {
                    let count = 0;
                    const uArr = u || [null, null, null, null];
                    for(let j=0; j<4; j++) {
                        const isCorrectSub = uArr[j] === q.answer[j];
                        if(isCorrectSub) count++;
                        // Tô màu các nút
                        const bT = document.getElementById(`q-${i}-tf-${j}-true`);
                        const bF = document.getElementById(`q-${i}-tf-${j}-false`);
                        if(q.answer[j]) bT.classList.add('ring-2', 'ring-emerald-400'); else bF.classList.add('ring-2', 'ring-emerald-400');
                    }
                    total += (TF_SCORE_MAP[count] * pts);
                    qCard.classList.add(count === 4 ? 'bg-emerald-50' : (count > 0 ? 'bg-yellow-50' : 'bg-red-50'));
                }
            });

            const scoreStr = total.toFixed(2);
            document.getElementById('final-score-display').innerText = scoreStr;
            setLoading(true);
            try { await fetch(GOOGLE_SCRIPT_URL, { method: 'POST', mode: 'no-cors', body: JSON.stringify({ type: 'submission', name: document.getElementById('userName').value, examCode: currentExam.code, score: scoreStr }) }); } catch(e) {}
            setLoading(false);
            window.scrollTo({ top: 0, behavior: 'smooth' });
        }
    </script>
</body>
</html>
