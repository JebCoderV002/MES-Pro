<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MES PRO - Hệ thống Quản lý Đề thi</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/sortablejs@1.15.0/Sortable.min.js"></script>
    <script>
        // Cấu hình Tailwind hỗ trợ class dark
        tailwind.config = {
            darkMode: 'class',
        }
    </script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&display=swap');
        body { font-family: 'Inter', sans-serif; overflow: hidden; }
        
        .custom-scrollbar::-webkit-scrollbar { width: 6px; }
        .custom-scrollbar::-webkit-scrollbar-track { background: transparent; }
        .custom-scrollbar::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 10px; }
        .dark .custom-scrollbar::-webkit-scrollbar-thumb { background: #475569; }
        
        .ans-card { transition: all 0.2s ease-in-out; border-left-width: 6px !important; }
        .ans-card-answered { border-left-color: #2563eb !important; background-color: #ffffff; box-shadow: 0 4px 6px -1px rgb(0 0 0 / 0.1); }
        .dark .ans-card-answered { background-color: #1e293b; box-shadow: 0 4px 6px -1px rgb(0 0 0 / 0.5); }
        
        .btn-selected { transform: scale(1.02); box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.1); }
        
        .correct-answer-highlight { 
            border-color: #10b981 !important; 
            color: #059669 !important;
            background-color: #ecfdf5 !important;
            box-shadow: 0 0 0 4px rgba(16, 185, 129, 0.2) inset;
            font-weight: 900 !important;
        }
        .dark .correct-answer-highlight {
            background-color: #064e3b !important;
            color: #34d399 !important;
        }

        .correct-bg { background-color: #f0fdf4 !important; border-color: #22c55e !important; }
        .dark .correct-bg { background-color: #064e3b !important; border-color: #10b981 !important; }
        
        .wrong-bg { background-color: #fef2f2 !important; border-color: #ef4444 !important; }
        .dark .wrong-bg { background-color: #450a0a !important; border-color: #f87171 !important; }

        .sortable-ghost { opacity: 0.4; background: #dbeafe !important; border: 2px dashed #3b82f6 !important; }
        .zoom-img { cursor: zoom-in; transition: transform 0.2s; }

        /* Animation cho toggle switch */
        #theme-toggle-btn i { transition: transform 0.5s cubic-bezier(0.4, 0, 0.2, 1); }
        .dark #theme-toggle-btn .fa-sun { display: block; }
        .dark #theme-toggle-btn .fa-moon { display: none; }
        #theme-toggle-btn .fa-sun { display: none; }
    </style>
</head>
<body class="bg-slate-50 text-slate-900 dark:bg-slate-950 dark:text-slate-100 h-screen flex flex-col transition-colors duration-300">

    <script>
        const IMGBB_API_KEY = "24fcd0d3d51b240e4a6a30ea1ac6c1e7";
        const GOOGLE_SCRIPT_URL = "https://script.google.com/macros/s/AKfycbwMD4ozlkx8xQzT1f-7nUjD4ZU1sVSVHEMj7PxwGUSGGGFRwf-TQJZAFeAbpivtKVC_2A/exec";
        const TF_SCORE_MAP = [0, 0.1, 0.25, 0.5, 1];

        // Init Dark Mode
        if (localStorage.theme === 'dark' || (!('theme' in localStorage) && window.matchMedia('(prefers-color-scheme: dark)').matches)) {
            document.documentElement.classList.add('dark');
        } else {
            document.documentElement.classList.remove('dark');
        }

        function toggleTheme() {
            if (document.documentElement.classList.contains('dark')) {
                document.documentElement.classList.remove('dark');
                localStorage.theme = 'light';
            } else {
                document.documentElement.classList.add('dark');
                localStorage.theme = 'dark';
            }
        }
    </script>

    <header id="main-header" class="bg-white dark:bg-slate-900 border-b dark:border-slate-800 p-3 flex justify-between items-center z-50 shadow-sm shrink-0">
        <div onclick="location.reload()" class="flex items-center gap-2 font-extrabold text-blue-700 dark:text-blue-400 text-xl cursor-pointer">
            <i class="fas fa-bolt text-yellow-500"></i> <span>MES PRO</span>
        </div>
        <div class="flex gap-2 items-center">
            <!-- Nút Dark Mode -->
            <button id="theme-toggle-btn" onclick="toggleTheme()" class="p-3 mr-2 text-slate-500 dark:text-slate-400 hover:bg-slate-100 dark:hover:bg-slate-800 rounded-xl transition-all">
                <i class="fas fa-moon text-lg"></i>
                <i class="fas fa-sun text-lg text-yellow-400"></i>
            </button>
            <button onclick="showView('home')" id="nav-home" class="px-5 py-2 text-xs font-bold rounded-xl transition bg-blue-50 text-blue-700 dark:bg-blue-900/30 dark:text-blue-300">Làm bài</button>
            <button onclick="showView('admin')" id="nav-admin" class="px-5 py-2 text-xs font-bold rounded-xl shadow-md transition bg-blue-700 text-white dark:bg-blue-600">Soạn đề</button>
        </div>
    </header>

    <main class="flex-1 relative overflow-hidden h-full">
        
        <!-- HOME VIEW -->
        <section id="view-home" class="h-full flex items-center justify-center p-4">
            <div class="bg-white dark:bg-slate-900 p-10 rounded-[2.5rem] shadow-2xl border dark:border-slate-800 w-full max-w-md">
                <div class="w-16 h-16 bg-blue-50 dark:bg-blue-900/30 text-blue-700 dark:text-blue-400 rounded-2xl flex items-center justify-center mx-auto mb-4 text-2xl"><i class="fas fa-paper-plane"></i></div>
                <h2 class="text-2xl font-black mb-8 text-center text-slate-800 dark:text-slate-100 uppercase tracking-tight">VÀO PHÒNG THI</h2>
                <div class="space-y-4">
                    <input id="userName" class="w-full p-4 bg-slate-50 dark:bg-slate-800 border-2 border-slate-100 dark:border-slate-700 rounded-2xl font-bold dark:text-white" placeholder="Họ và tên">
                    <input id="examCodeInput" class="w-full p-4 bg-slate-50 dark:bg-slate-800 border-2 border-slate-100 dark:border-slate-700 rounded-2xl font-bold text-blue-700 dark:text-blue-400 tracking-widest text-lg" placeholder="Mã đề">
                    <button onclick="startExam()" class="w-full bg-blue-700 dark:bg-blue-600 text-white p-5 rounded-2xl font-black shadow-xl hover:bg-blue-800 transition">BẮT ĐẦU</button>
                </div>
            </div>
        </section>

        <!-- ADMIN VIEW -->
        <section id="view-admin" class="hidden h-full overflow-y-auto p-4 lg:p-8 max-w-7xl mx-auto custom-scrollbar">
            <div class="grid grid-cols-1 lg:grid-cols-12 gap-8 pb-32">
                <div class="lg:col-span-4 space-y-6">
                    <div class="bg-white dark:bg-slate-900 p-6 rounded-3xl border dark:border-slate-800 shadow-sm space-y-4 text-[11px]">
                        <h3 class="font-black text-slate-400 dark:text-slate-500 uppercase tracking-widest">1. Cấu hình</h3>
                        <input id="admin-title" class="w-full p-3 bg-slate-50 dark:bg-slate-800 border dark:border-slate-700 rounded-xl font-bold dark:text-white" placeholder="Tên kỳ thi">
                        <input id="admin-code" class="w-full p-3 bg-slate-50 dark:bg-slate-800 border dark:border-slate-700 rounded-xl font-black uppercase text-blue-700 dark:text-blue-400" placeholder="Mã đề">
                        <input id="admin-duration" type="number" class="w-full p-3 bg-slate-50 dark:bg-slate-800 border dark:border-slate-700 rounded-xl font-black dark:text-white" value="45">
                        <input type="file" id="file-upload" class="hidden" multiple accept="image/*" onchange="handleFileUpload(event)">
                        <button onclick="document.getElementById('file-upload').click()" class="w-full py-6 border-2 border-dashed border-blue-200 dark:border-blue-800 rounded-3xl text-blue-700 dark:text-blue-400 font-black hover:bg-blue-50 dark:hover:bg-blue-900/20">TẢI ẢNH ĐỀ</button>
                    </div>
                    <div id="admin-image-preview" class="space-y-3"></div>
                </div>
                <div class="lg:col-span-8 space-y-6">
                    <div class="bg-white dark:bg-slate-900 p-6 rounded-3xl border dark:border-slate-800 shadow-sm">
                        <div class="flex justify-between items-center mb-6">
                            <h3 class="font-black text-xs text-slate-400 dark:text-slate-500 uppercase tracking-widest">2. Đáp án</h3>
                            <div class="flex gap-2">
                                <button onclick="addQuickQuestion('mcq')" class="px-3 py-2 bg-slate-900 dark:bg-slate-800 text-white rounded-lg text-[10px] font-black">TRẮC NGHIỆM</button>
                                <button onclick="addQuickQuestion('true_false')" class="px-3 py-2 bg-emerald-600 text-white rounded-lg text-[10px] font-black">ĐÚNG/SAI</button>
                                <button onclick="addQuickQuestion('short')" class="px-3 py-2 bg-purple-600 text-white rounded-lg text-[10px] font-black">NGẮN</button>
                            </div>
                        </div>
                        <div id="admin-question-list" class="space-y-2"></div>
                    </div>
                    <button onclick="saveToSheet()" class="w-full bg-blue-700 dark:bg-blue-600 text-white p-5 rounded-3xl font-black text-lg shadow-xl uppercase">XUẤT BẢN ĐỀ THI</button>
                </div>
            </div>
        </section>

        <!-- EXAM VIEW -->
        <section id="view-exam" class="hidden h-full flex flex-col md:flex-row overflow-hidden bg-slate-200 dark:bg-slate-950">
            <div id="exam-de-thi" class="flex-1 md:w-[60%] h-[50%] md:h-full overflow-y-auto p-4 md:p-8 custom-scrollbar scroll-smooth">
                <div id="exam-pages-container" class="max-w-4xl mx-auto space-y-6"></div>
            </div>
            <div id="exam-dap-an" class="w-full md:w-[450px] h-[50%] md:h-full bg-slate-50 dark:bg-slate-900 border-l border-slate-300 dark:border-slate-800 shadow-2xl flex flex-col shrink-0">
                <div class="p-4 bg-white dark:bg-slate-900 border-b dark:border-slate-800 flex justify-between items-center shadow-sm">
                    <div>
                        <div id="timer-text" class="text-3xl font-black text-red-600 tabular-nums">00:00</div>
                        <div id="user-info-bar" class="text-[10px] font-black text-slate-400 dark:text-slate-500 uppercase tracking-widest">---</div>
                    </div>
                    <div id="score-box" class="hidden flex items-center gap-3">
                        <span class="text-[10px] font-black text-blue-700 bg-blue-50 dark:bg-blue-900/30 dark:text-blue-400 px-2 py-1 rounded">ĐIỂM SỐ</span>
                        <div id="final-score" class="text-4xl font-black text-blue-800 dark:text-blue-400">0.0</div>
                    </div>
                    <div class="flex items-center gap-2">
                        <button id="theme-toggle-btn-exam" onclick="toggleTheme()" class="p-3 text-slate-500 dark:text-slate-400 hover:bg-slate-100 dark:hover:bg-slate-800 rounded-xl transition-all">
                             <i class="fas fa-adjust"></i>
                        </button>
                        <button id="btn-submit" onclick="confirmSubmit()" class="bg-emerald-600 text-white px-8 py-4 rounded-2xl font-black text-sm shadow-lg active:scale-95">NỘP BÀI</button>
                    </div>
                </div>
                <div id="exam-answer-sheet" class="flex-1 overflow-y-auto p-5 space-y-6 custom-scrollbar"></div>
                <div class="p-4 bg-white dark:bg-slate-900 border-t dark:border-slate-800 flex justify-between items-center">
                    <button onclick="handleExit()" class="text-[10px] font-black text-slate-400 dark:text-slate-500 uppercase"><i class="fas fa-times mr-1"></i> Thoát</button>
                </div>
            </div>
        </section>

    </main>

    <div id="loading" class="hidden fixed inset-0 bg-slate-900/80 backdrop-blur-md z-[100] flex flex-col items-center justify-center text-white">
        <div class="w-12 h-12 border-4 border-blue-500 border-t-transparent rounded-full animate-spin mb-4"></div>
        <p class="text-xs font-black tracking-widest uppercase">Đang xử lý...</p>
    </div>

    <div id="modal-confirm" class="hidden fixed inset-0 bg-slate-950/70 z-[200] flex items-center justify-center p-4 backdrop-blur-sm">
        <div class="bg-white dark:bg-slate-900 rounded-[2.5rem] p-10 max-w-sm w-full text-center border dark:border-slate-800">
            <h3 class="text-2xl font-black text-slate-800 dark:text-slate-100 mb-6 uppercase">Nộp bài thi ngay?</h3>
            <button onclick="submitExam()" class="w-full py-5 bg-emerald-600 text-white rounded-2xl font-black mb-3">XÁC NHẬN NỘP</button>
            <button onclick="toggleModal('modal-confirm', false)" class="w-full py-3 text-slate-400 dark:text-slate-500 font-bold">LÀM TIẾP</button>
        </div>
    </div>

    <script>
        let examData = { title: '', code: '', duration: 45, pages: [], questions: [] };
        let currentExam = null;
        let userAnswers = {};
        let timerInterval = null;
        let isSubmitted = false;

        window.onload = function() {
            const el = document.getElementById('admin-image-preview');
            Sortable.create(el, {
                animation: 200,
                onEnd: function() {
                    const newPages = [];
                    el.querySelectorAll('.admin-page-item').forEach(item => newPages.push(item.dataset.url));
                    examData.pages = newPages;
                    renderAdminImages();
                }
            });
        };

        function showView(name) {
            ['home', 'admin', 'exam'].forEach(v => document.getElementById(`view-${v}`).classList.add('hidden'));
            document.getElementById(`view-${name}`).classList.remove('hidden');
            document.getElementById('main-header').classList.toggle('hidden', name === 'exam');
        }

        function setLoading(s) { document.getElementById('loading').classList.toggle('hidden', !s); }
        function toggleModal(id, show) { document.getElementById(id).classList.toggle('hidden', !show); }

        // --- ADMIN ---
        async function handleFileUpload(e) {
            const files = Array.from(e.target.files);
            if(!files.length) return;
            setLoading(true);
            const uploadPromises = files.map(async (file) => {
                const formData = new FormData();
                formData.append('image', file);
                try {
                    const res = await fetch(`https://api.imgbb.com/1/upload?key=${IMGBB_API_KEY}`, { method: 'POST', body: formData });
                    const json = await res.json();
                    return json.data.url;
                } catch(e) { return null; }
            });
            const urls = await Promise.all(uploadPromises);
            examData.pages.push(...urls.filter(u => u !== null));
            renderAdminImages();
            setLoading(false);
        }

        function renderAdminImages() {
            const container = document.getElementById('admin-image-preview');
            container.innerHTML = examData.pages.map((url, i) => `
                <div class="admin-page-item relative rounded-2xl overflow-hidden border-2 border-white dark:border-slate-800 shadow-sm cursor-move group" data-url="${url}">
                    <img src="${url}" class="w-full h-auto max-h-[300px] object-contain bg-white dark:bg-slate-800">
                    <span class="absolute top-2 left-2 bg-blue-700 text-white text-[9px] px-2 py-1 rounded-lg font-black uppercase">Trang ${i+1}</span>
                    <button onclick="removePage(${i})" class="absolute inset-0 bg-red-600/60 text-white opacity-0 group-hover:opacity-100 transition flex items-center justify-center text-xl"><i class="fas fa-trash"></i></button>
                </div>
            `).join('');
        }
        function removePage(i) { examData.pages.splice(i, 1); renderAdminImages(); }

        function addQuickQuestion(type) {
            examData.questions.push({ type, points: type==='mcq'?0.25:(type==='true_false'?1.0:0.5), answer: type==='true_false'?[true,true,true,true]:(type==='mcq'?'A':'') });
            renderAdminQuestionList();
        }

        function renderAdminQuestionList() {
            const list = document.getElementById('admin-question-list');
            list.innerHTML = examData.questions.map((q, i) => `
                <div class="flex items-center gap-3 bg-slate-50 dark:bg-slate-800/50 p-3 rounded-2xl border border-slate-200 dark:border-slate-700">
                    <span class="w-7 h-7 flex items-center justify-center bg-blue-700 text-white rounded-lg font-black text-[11px]">${i+1}</span>
                    <div class="flex-1 flex gap-1">
                        ${q.type==='mcq' ? ['A','B','C','D'].map(l => `<button onclick="setAdminAns(${i},'${l}')" class="w-8 h-8 rounded-lg border-2 font-black text-[11px] ${q.answer===l?'bg-blue-700 text-white border-blue-700 dark:bg-blue-600 dark:border-blue-600':'bg-white dark:bg-slate-900 text-slate-300 dark:text-slate-600 border-slate-100 dark:border-slate-800'}">${l}</button>`).join('') :
                          q.type==='true_false' ? q.answer.map((v,j) => `<button onclick="toggleAdminTF(${i},${j})" class="px-2 h-8 rounded-lg border-2 font-black text-[9px] ${v?'bg-emerald-600 text-white border-emerald-600':'bg-red-600 text-white border-red-600'}">${j+1}${v?'Đ':'S'}</button>`).join('') :
                          `<input onchange="setAdminAns(${i},this.value)" class="flex-1 px-3 h-8 rounded-lg border-2 dark:bg-slate-900 dark:border-slate-800 text-[11px] font-bold dark:text-white" value="${q.answer}" placeholder="Đáp án...">`
                        }
                    </div>
                    <input type="number" step="0.1" onchange="examData.questions[${i}].points=parseFloat(this.value)" class="w-12 bg-white dark:bg-slate-900 border dark:border-slate-700 rounded-lg p-1 text-center font-black text-blue-700 dark:text-blue-400 text-[11px]" value="${q.points}">
                    <button onclick="examData.questions.splice(${i},1);renderAdminQuestionList()" class="text-slate-300 dark:text-slate-700 hover:text-red-600"><i class="fas fa-times-circle"></i></button>
                </div>
            `).join('');
        }
        function setAdminAns(i, v) { examData.questions[i].answer = v; renderAdminQuestionList(); }
        function toggleAdminTF(i, j) { examData.questions[i].answer[j] = !examData.questions[i].answer[j]; renderAdminQuestionList(); }

        async function saveToSheet() {
            examData.title = document.getElementById('admin-title').value;
            examData.code = document.getElementById('admin-code').value.trim().toUpperCase();
            examData.duration = parseInt(document.getElementById('admin-duration').value);
            if(!examData.code || !examData.pages.length) return alert("Nhập mã đề và ảnh!");
            setLoading(true);
            try { await fetch(GOOGLE_SCRIPT_URL, { method: 'POST', mode: 'no-cors', body: JSON.stringify({ type: 'save_exam', code: examData.code, data: examData }) }); alert("Lưu thành công!"); } catch(e) { alert("Lỗi!"); }
            setLoading(false);
        }

        // --- EXAM ---
        async function startExam() {
            const name = document.getElementById('userName').value.trim();
            const code = document.getElementById('examCodeInput').value.trim().toUpperCase();
            if(!name || !code) return alert("Điền đủ thông tin!");
            setLoading(true);
            try {
                const res = await fetch(`${GOOGLE_SCRIPT_URL}?code=${code}&t=${Date.now()}`);
                const data = await res.json();
                if(data.error) alert(data.error);
                else { currentExam = data; userAnswers = {}; isSubmitted = false; document.getElementById('user-info-bar').innerText = name; renderExamView(); startTimer(data.duration); showView('exam'); }
            } catch(e) { alert("Lỗi tải đề!"); }
            setLoading(false);
        }

        function renderExamView() {
            document.getElementById('exam-pages-container').innerHTML = currentExam.pages.map(p => `<img src="${p}" class="w-full rounded-2xl shadow-xl border-4 border-white dark:border-slate-800 zoom-img" onclick="window.open('${p}')">`).join('');
            const sheet = document.getElementById('exam-answer-sheet');
            sheet.innerHTML = currentExam.questions.map((q, i) => {
                let html = '';
                if(q.type === 'mcq') html = `<div class="grid grid-cols-4 gap-3">${['A','B','C','D'].map(l => `<button id="ans-${i}-${l}" onclick="setUAns(${i},'${l}')" class="py-4 border-2 rounded-2xl font-black text-slate-400 dark:text-slate-600 bg-white dark:bg-slate-900 border-slate-100 dark:border-slate-800">${l}</button>`).join('')}</div>`;
                else if(q.type === 'true_false') html = `<div class="grid grid-cols-2 gap-3">${[0,1,2,3].map(j => `<div class="bg-white dark:bg-slate-900 border-2 border-slate-50 dark:border-slate-800 p-2 rounded-2xl flex items-center gap-2"><span class="text-[9px] font-black text-blue-300 dark:text-blue-900 ml-1">${j+1}</span><div class="flex-1 flex gap-2"><button id="tf-${i}-${j}-T" onclick="setUTF(${i},${j},true)" class="flex-1 py-3 rounded-xl border-2 font-black text-xs text-slate-200 dark:text-slate-700 border-slate-50 dark:border-slate-800">Đ</button><button id="tf-${i}-${j}-F" onclick="setUTF(${i},${j},false)" class="flex-1 py-3 rounded-xl border-2 font-black text-xs text-slate-200 dark:text-slate-700 border-slate-50 dark:border-slate-800">S</button></div></div>`).join('')}</div>`;
                else html = `<input onchange="setUAns(${i},this.value)" class="w-full p-5 bg-white dark:bg-slate-900 border-2 border-slate-100 dark:border-slate-800 rounded-2xl font-black text-blue-700 dark:text-blue-400 outline-none" placeholder="Câu trả lời...">`;
                return `<div id="q-card-${i}" class="ans-card p-6 bg-white dark:bg-slate-900 rounded-[2rem] border-2 border-transparent dark:border-slate-800 space-y-4">
                    <div class="flex justify-between items-center"><span class="text-[10px] font-black text-slate-400 dark:text-slate-500 uppercase tracking-widest">CÂU ${i+1}</span><span id="q-score-${i}" class="text-[10px] font-bold text-slate-300 dark:text-slate-700 uppercase">${q.points}đ</span></div>
                    ${html}
                    <div id="correct-label-${i}" class="hidden mt-3 p-3 bg-emerald-50 dark:bg-emerald-900/30 text-emerald-700 dark:text-emerald-400 rounded-xl text-xs font-black border border-emerald-100 dark:border-emerald-800"></div>
                </div>`;
            }).join('');
        }

        function setUAns(i, v) {
            if(isSubmitted) return;
            userAnswers[i] = v;
            document.getElementById(`q-card-${i}`).classList.add('ans-card-answered');
            if(currentExam.questions[i].type === 'mcq') {
                ['A','B','C','D'].forEach(l => {
                    const b = document.getElementById(`ans-${i}-${l}`);
                    b.className = l===v ? "py-4 border-2 rounded-2xl font-black bg-blue-700 dark:bg-blue-600 border-blue-700 dark:border-blue-600 text-white shadow-lg btn-selected" : "py-4 border-2 border-slate-50 dark:border-slate-800 rounded-2xl font-black text-slate-200 dark:text-slate-700 bg-white dark:bg-slate-900 opacity-40";
                });
            }
        }

        function setUTF(i, j, v) {
            if(isSubmitted) return;
            if(!userAnswers[i]) userAnswers[i] = [null,null,null,null];
            userAnswers[i][j] = v;
            const bT = document.getElementById(`tf-${i}-${j}-T`), bF = document.getElementById(`tf-${i}-${j}-F`);
            if(v) { bT.className = "flex-1 py-3 rounded-xl bg-emerald-600 border-emerald-600 text-white font-black shadow-md btn-selected"; bF.className = "flex-1 py-3 rounded-xl border-2 border-slate-50 dark:border-slate-800 text-slate-200 dark:text-slate-700 bg-white dark:bg-slate-900 opacity-40 font-black"; }
            else { bF.className = "flex-1 py-3 rounded-xl bg-red-600 border-red-600 text-white font-black shadow-md btn-selected"; bT.className = "flex-1 py-3 rounded-xl border-2 border-slate-50 dark:border-slate-800 text-slate-200 dark:text-slate-700 bg-white dark:bg-slate-900 opacity-40 font-black"; }
            if(userAnswers[i].every(x => x !== null)) document.getElementById(`q-card-${i}`).classList.add('ans-card-answered');
        }

        function startTimer(m) {
            let s = m * 60;
            clearInterval(timerInterval);
            timerInterval = setInterval(() => {
                const mm = Math.floor(s/60), ss = s%60;
                document.getElementById('timer-text').innerText = `${mm.toString().padStart(2,'0')}:${ss.toString().padStart(2,'0')}`;
                if(s <= 0) { clearInterval(timerInterval); submitExam(); }
                s--;
            }, 1000);
        }

        async function submitExam() {
            isSubmitted = true; clearInterval(timerInterval); toggleModal('modal-confirm', false);
            document.getElementById('btn-submit').classList.add('hidden');
            document.getElementById('score-box').classList.remove('hidden');

            let totalScore = 0;
            currentExam.questions.forEach((q, i) => {
                const u = userAnswers[i];
                const pts = parseFloat(q.points);
                const card = document.getElementById(`q-card-${i}`);
                const lbl = document.getElementById(`correct-label-${i}`);

                if(q.type === 'mcq') {
                    const isCorrect = (u === q.answer);
                    if(isCorrect) {
                        totalScore += pts;
                        card.classList.add('correct-bg');
                    } else {
                        card.classList.add('wrong-bg');
                        const correctBtn = document.getElementById(`ans-${i}-${q.answer}`);
                        if(correctBtn) correctBtn.classList.add('correct-answer-highlight');
                    }
                } else if(q.type === 'true_false') {
                    let correctCount = 0;
                    const ua = u || [null,null,null,null];
                    for(let j=0; j<4; j++) {
                        const isCorrectPart = (ua[j] === q.answer[j]);
                        if(isCorrectPart) correctCount++;
                        
                        const correctChar = q.answer[j] ? 'T' : 'F';
                        const correctBtn = document.getElementById(`tf-${i}-${j}-${correctChar}`);
                        if(correctBtn) {
                            if (!isCorrectPart) {
                                correctBtn.classList.add('correct-answer-highlight', 'ring-2', 'ring-emerald-500');
                                correctBtn.style.opacity = "1";
                            }
                        }
                    }
                    totalScore += (TF_SCORE_MAP[correctCount] * pts);
                    card.classList.add(correctCount === 4 ? 'correct-bg' : (correctCount > 0 ? 'bg-amber-50' : 'wrong-bg'));
                    lbl.innerText = `Đáp án đúng: ${q.answer.map((v, idx) => (idx+1)+(v?'Đ':'S')).join(' ')}`;
                    lbl.classList.remove('hidden');
                } else {
                    const isCorrect = (u && u.trim().toLowerCase() === q.answer.toString().toLowerCase());
                    if(isCorrect) {
                        totalScore += pts;
                        card.classList.add('correct-bg');
                    } else {
                        card.classList.add('wrong-bg');
                    }
                    lbl.innerText = `Đáp án đúng: ${q.answer}`;
                    lbl.classList.remove('hidden');
                }
            });

            document.getElementById('final-score').innerText = totalScore.toFixed(2);
            setLoading(true);
            try { await fetch(GOOGLE_SCRIPT_URL, { method: 'POST', mode: 'no-cors', body: JSON.stringify({ type: 'submission', name: document.getElementById('userName').value, examCode: currentExam.code, score: totalScore.toFixed(2) }) }); } catch(e) {}
            setLoading(false);
            document.getElementById('exam-answer-sheet').scrollTo({top:0, behavior:'smooth'});
        }

        function confirmSubmit() { toggleModal('modal-confirm', true); }
        function handleExit() { if(confirm("Kết quả chưa nộp sẽ bị mất. Thoát?")) location.reload(); }
    </script>
</body>
</html>
